upgrades:
  commands:
    main:
      parameters: ""
      description: "Open the upgrade shop interface"
    admin:
      description: "Open the admin interface for upgrade"
  error:
    costwithdraw: "&c Couldn't withdraw money. You should talk about this to an administrator"
    increasenolimits: "&c You can't increase the limits of something not limited. You should talk about this to an administrator"
    notonisland: "&c You need to be on your island to do that"
    rangeovermax: "&c You tried to upgrade you island range over the max? You should talk about this to an administrator"
    placeblock: "&c Before buying this upgrade, you need to place/break at least one block"
    loaderror: "&c [what] faild to load. You should look at the consol for error"
    upgradeinvalid: "&c Upgrade [what] [upgradeId] not valid. It will be ignored"
    unknownerror: "&c An error happened. You should look at the consol for error"
    noiteminhand: "&c You dont have any item in your main hand"
  message:
    skipupgradeload: "&c Upgrade [what] [upgradeId] was already loaded"
    upgradeload: "&a Upgrade [what] [upgradeId] was loaded"
  chatinput:
    admin:
      question:
        getupgradeid: "Write the unique name for this upgrade"
        gettierid: "Write the unique name for this tier"
        getupgradedataname: |-
          Write shown name
          Actual is '[name]'
        getupgradedatadesc: |-
          Write the upgrade description. Each message will be a new line in description
          Write '[end]' to end prompt
        getupgradedataorder: |-
          Write the upgrade order. Default is -1, -1 is last.
          For upgrade on the same order, alphabetical order is used.
        getupgradetiername: |-
          Write shown name
          Actual is '[name]'
        getupgradetierdesc: |-
          Write the tier description. Each message will be a new line in description
          Write '[end]' to end prompt
      invalid:
        getupgradeid: "&c This name is already taken. Choose another one"
        gettierid: "&c This name is already taken. Choose another one"
        getupgradedataorder: "&c Order need to be a number greater than -1"
  ui:
    upgradepanel:
      islandneed: "Island Min Level: [islandlevel]"
      limitsupgrade: "[block] limits upgrade of [level]"
      limitsupgradedone: "&a Your island [block] limits was upgraded by [level]"
      maxlevel: "Max level reached"
      moneycost: "Money cost: [cost]"
      nolimitsupgrade: "&7[block] limits upgrade"
      norangeupgrade: "&7 Range upgrade"
      rangeupgrade: "Range upgrade of [rangelevel]"
      rangeupgradedone: "&a Your island range was upgraded by [rangelevel] blocks"
      tiernameandlevel: "&e&o&l[name]&e &7(&a[current] &7/ &2[max]&7)"
      title: "Island upgrade shop"
      tryreloadlevel: "Don't forget to update your island level with the level command"
      previous:
        name: "&7Previous page"
        description: "&7Go to previous page"
        tooltip: "Click to go to previous page"
      next:
        name: "&7Next page"
        description: "&7Go to next page"
        tooltip: "Click to go to next page"
      upgrade:
        tooltip: "Click to purchase upgrade"
    editupgradepanel:
      active: "Active"
      activedesc: "Click to turn inactive"
      inactive: "Inactive"
      inactivedesc: "Click to turn active"
      description: "Actual description"
      namedesc: "Actual name, showed to the player"
      icon: "Upgrade icon"
      icondesc: |-
        Click to change
        Will take item in hand
      tieradd: "Add tier"
      tieredit: "Edit tier"
      tierdelete: "Delete tier"
      tierrequired: "Add at least one tier before editing or deleting"
      order: "Actual order: [order]"
      orderdesc: |-
        Click to change order
        upgrade of the same order will be sorted by alphabetical order  
    edittierpanel:
      namedesc: "Actual name, showed to the player"
      description: "Actual description"
      icon: "Tier icon"
      icondesc: |-
        Click to change
        Will take item in hand
      nblevel: "Nb of time you can buy this tier"
      nbleveldesc: |-
        Actual [actual]
        Left click to lower the nb
        Right click to increase the nb
      order: "Change the order of tiers"
      orderdesc: |-
        Actual [actual]/[max]
        Left click to lower the order
        Right click to increase the order
      prices: "Prices"
      rewards: "Rewards"
    listadmintierpricepanel:
      title: "List of prices"
      create: "Add new price"
      leftdesc: "&cLeft click: update"
      rightdesc: "&cRight click: delete"
    listadminpricepanel:
      title: "List of available prices"
    listadmintierrewardpanel:
      title: "List of rewards"
      create: "Add new reward"
      leftdesc: "&cLeft click: update"
      rightdesc: "&cRight click: delete"
    listadminrewardpanel:
      title: "List of available rewards"
    islandlevelpricepanel:
      title: "Island level price"
    buttons:
      return: "Return"
      exit: "Exit"
      yesbutton: "Yes"
      nobutton: "No"
      addupgrade: "Add upgrade"
      deleteupgrade: "Delete upgrade"
      editupgrade: "Edit upgrade"
      active: "Active"
      validconf: "Valid configuration"
      invalidconf: "Invalid configuration"
      noupgrades: "No upgrades yet — click 'Add upgrade' to create one"
      leftclickedit: "&aLeft click: Edit"
      rightclickdelete: "&cRight click: Delete"
    titles:
      adminupgrade: "Admin upgrade"
      delete: "Delete: [name]"
      editlist: "List: edit"
      deletelist: "List: delete"
      listupgradetier: "List tier for upgrade [upgradedata]"
      listupgradeprices: "List of price for this tier"
  prices:
    islandlevel:
      name: "Island level"
      description: "Min. island level: [level]"
      admindescription: |-
        Add a minimum required level
        This price don't use anything
      paneltitle: "Island level price"
      rulequestion: |-
        Enter the new rule for this island level price
        Actual: [actual]
    money:
      name: "Money"
      description: "Costs [amount] money"
      admindescription: "Charge Vault currency"
      paneltitle: "Money price"
      rulequestion: |-
        Enter amount formula (e.g. 100*[level])
        Actual: [actual]
    item:
      name: "Item"
      description: "Costs [amount]x [item]"
      admindescription: "Requires items from inventory"
      paneltitle: "Item price"
    permission:
      name: "Permission"
      description: "Requires permission [permission]"
      admindescription: "Gate by permission node"
      paneltitle: "Permission price"
      rulequestion: |-
        Enter permission node
        Actual: [actual]
  rewards:
    rangeupgrade:
      name: "Range upgrade"
      description: "Increase border by [rangelevel] blocks"
      admindescription: |-
        Increase the island border size
        Careful to not go over the island limit
      paneltitle: "Range upgrade reward"
      rulequestion: |-
        Enter the range formula (e.g. 5, or 2*[level])
        Actual: [actual]
      invalidrule: "Invalid formula. Use a number or math expression (e.g. 5, 2*[level])"
      setformula: "Set range formula"
      formulastatus: "Formula OK"
      formulaneeded: "Formula needed"
      formulaneededdesc: "Click the paper icon to set a range formula"
    limits:
      name: "Limits upgrade"
      description: "Increases [type] limit for [target] by [amount]"
      admindescription: "Increase block/entity limits (requires Limits addon)"
      paneltitle: "Limits reward"
    command:
      name: "Command"
      description: "Runs commands on upgrade"
      admindescription: "Execute console or player commands"
      paneltitle: "Command reward"
    spawner:
      name: "Spawner Boost"
      description: "+[amount] entities per spawner trigger"
      admindescription: "Spawn extra entities per spawner activation"
      paneltitle: "Spawner boost reward"
      rulequestion: |-
        Enter spawn bonus formula (e.g. 0.5, 0.1*[level])
        Actual: [actual]
      invalidrule: "Invalid formula. Use a number or math expression (e.g. 0.5, 0.1*[level])"
      setformula: "Set spawn bonus formula"
      formulastatus: "Formula OK"
      formulaneeded: "Formula needed"
      formulaneededdesc: "Click the paper icon to set a spawn bonus formula"
    cropgrowth:
      name: "Crop Growth Boost"
      description: "+[amount] extra growth trigger per crop tick"
      admindescription: "Increase crop growth speed per island"
      paneltitle: "Crop growth reward"
      rulequestion: |-
        Enter growth bonus formula (e.g. 0.5, 0.1*[level])
        Actual: [actual]
      invalidrule: "Invalid formula. Use a number or math expression (e.g. 0.5, 0.1*[level])"
      setformula: "Set growth bonus formula"
      formulastatus: "Formula OK"
      formulaneeded: "Formula needed"
      formulaneededdesc: "Click the paper icon to set a growth bonus formula"
protection:
  flags:
    UPGRADES_RANK_RIGHT:
      description: "Switch who can upgrade"
      name: "Upgrade Rank"
