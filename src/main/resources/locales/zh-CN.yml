upgrades:
  commands:
    main:
      parameters: ''
      description: '&R打开 升级商店 菜单'
    admin:
      description: '&R编辑 升级 菜单'
  error:
    costwithdraw: '&c Couldn''t withdraw money. You should talk about this to an administrator'
    increasenolimits: '&c You can''t increase the limits of something not limited.
      You should talk about this to an administrator'
    notonisland: |-
      &R &R
      &C仅 自己 岛屿&R
    rangeovermax: '&c You tried to upgrade you island range over the max? You should
      talk about this to an administrator'
    placeblock: '&c Before buying this upgrade, you need to place/break at least one
      block'
    loaderror: '&c [what] faild to load. You should look at the consol for error'
    upgradeinvalid: '&c Upgrade [what] [upgradeId] not valid. It will be ignored'
    unknownerror: '&c An error happened. You should look at the consol for error'
    noiteminhand: |-
      &R &R
      &R你 &C主手&R 为 空
  message:
    skipupgradeload: '&c Upgrade [what] [upgradeId] was already loaded'
    upgradeload: |-
      &R &R
      &R[what]
      &R[upgradeId]
      &R已创建
  chatinput:
    admin:
      question:
        getupgradeid: |-
          &R &R
          &R输入 新升级 &C唯一&R名
        gettierid: |-
          &R &R
          &R输入 新一层 &C唯一&R名
        getupgradedataname: |-
          &R &R
          &R输入 此升级 新 显示名
          &R[name]
        getupgradedatadesc: |-
          &R &R
          &R输入 管理员 描述
          &R直接结束 为 清空
          &R每条消息为一行
          &R区分大小写 结束输入
          &R[end]
        getupgradedataorder: |-
          &R &R
          &R输入管理员菜单排位顺序
          &R默认 -1 表示最后一位
          &R同一顺序按A-Z排序
          &R区分大小写 取消输入 END
        getupgradetiername: |-
          Write shown name
          Actual is '[name]'
        getupgradetierdesc: |-
          Write the tier description. Each message will be a new line in description
          Write '[end]' to end prompt
      invalid:
        getupgradeid: '&c This name is already taken. Choose another one'
        gettierid: '&c This name is already taken. Choose another one'
        getupgradedataorder: |-
          &R &R
          &C序号必须大于 -1&R
  ui:
    upgradepanel:
      islandneed: 'Island Min Level: [islandlevel]'
      limitsupgrade: '[block] limits upgrade of [level]'
      limitsupgradedone: '&a Your island [block] limits was upgraded by [level]'
