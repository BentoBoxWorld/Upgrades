        &R &R
        &C点击更改&R&F此升级&R
        &F图标 为 你&R &C主手&R &F物品&R
      tieradd: '&R添加升级层'
      tieredit: '&R编辑升级层'
      tierdelete: '&R删除升级层'
      tierrequired: |-
        &R &R
        &F没有层级&R
        &F添加 层级 可 编辑 与 删除&R
      order: '&R当前排序 [order]'
      orderdesc: |-
        &R &R
        &R管理员菜单排位顺序
        &C点击&R&B输入&R&F排序&R
        &F同一顺序按A-Z排序&R
    edittierpanel:
      namedesc: |-
        &R &R
        &C点击&R&B输入&F此层&R
        &F显示名&R
      description: '&C点击&R &B输入&R 此层 描述'
      icon: '&R层级 图标'
      icondesc: |-
        &R &R
        &C点击更改&F此层&R
        &F图标 为 你&R &C主手&R &F物品&R
      nblevel: '&R此层 可升级次数'
      nbleveldesc: |-
        &R &R
        &F当前 [actual]/满级&R
        &F左键 降低&R
        &F右键 增加&R
      order: '&R调整此层排序'
      orderdesc: |-
        &R &R
        &F当前 [actual]&R
        &F左键 降低&R
        &F右键 增加&R
      prices: '&R打开条件菜单'
      rewards: '&R打开奖励菜单'
    listadmintierpricepanel:
      title: '&R条件 菜单'
      create: '&R添加新条件'
      leftdesc: |-
        &R &R
        &F左键 编辑 条件&R
      rightdesc: |-
        &R &R
        &C右键 删除 条件&R
    listadminpricepanel:
      title: '&R可用 条件 菜单'
    listadmintierrewardpanel:
      title: '&R奖励 菜单'
      create: '&R添加新奖励'
      leftdesc: |-
        &R &R
        &F左键 编辑 奖励&R
      rightdesc: |-
        &R &R
        &C右键 删除 奖励&R
    listadminrewardpanel:
      title: '&R可用 奖励 菜单'
    islandlevelpricepanel:
      title: Island level price
    buttons:
      return: '&R返回'
      exit: '&R退出'
      yesbutton: '&R是 &C确认删除&R'
      nobutton: '&R否 &A点错&R'
      addupgrade: '&R添加升级'
      deleteupgrade: Delete upgrade
      editupgrade: Edit upgrade
      active: Active
      validconf: '&A配置 当前 有效&R'
      invalidconf: '&C配置 当前 无效&R'
      noupgrades: No upgrades yet — click 'Add upgrade' to create one
      leftclickedit: '&A左 编辑&R'
      rightclickdelete: '&C右 删除&R'
    titles:
      adminupgrade: '&R升级商店 管理员菜单'
      delete: '&R删除配置 [name]'
      editlist: '&R编辑层级'
      deletelist: '&R删除层级'
      listupgradetier: List tier for upgrade [upgradedata]
      listupgradeprices: List of price for this tier
  prices:
    item:
      name: '&R要求 物品'
      description: |-
        &R &R
        &F[amount]&R
        &F[item]&R
      admindescription: |-
        &R &R
        &F设置 物品 购买 升级&R
      paneltitle: '&R物品要求 条件编辑菜单'
    islandlevel:
      name: '&R要求 岛屿等级'
      description: |-
        &R &R
        &F最少&R &C[level]&R&F级 岛屿&R
      admindescription: |-
        &R &R
        &F设置 最少 多少级 岛屿 可 升级&R
      paneltitle: '&R岛屿等级要求 条件编辑菜单'
      rulequestion: |-
        &R &R
        &R输入 最低要求岛屿等级
        &R当前 [actual]
    money:
      name: '&R要求 基础货币'
      description: |-
        &R &R
        &C[amount]&R
        &F基础货币&R
      admindescription: |-
        &R &R
        &F设置 基础货币 购买 升级&R
      paneltitle: 基础货币要求 条件编辑菜单
      rulequestion: |-
        &R &R
        &R输入 升级扣款公式 例子 100*[level]
        &R[level]为次数 也就是说 第二次升级是2百 第三次3百 以此类推
        &R当前
        &R[actual]
    permission:
      name: '&R权限 要求'
      description: |-
        &R &R
        &F需权限&R &C[permission]&R
      admindescription: |-
        &R &R
        &F设置 拥有 权限 可 升级&R
      paneltitle: 权限要求 条件编辑菜单
      rulequestion: |-
        &R &R
        &R输入 需什么权限升级
        &R当前
        &R[actual]
  rewards:
    spawner:
      name: '&R刷怪笼 加成'
      description: |-
        &R &R
        &F每刷怪笼额外&R
        &A+[amount]&R
        &F刷新量&R
      admindescription: |-
        &R &R
        &F每刷怪笼额外刷新量&R
      paneltitle: '&R刷怪笼加成 奖励编辑菜单'
      rulequestion: |-
        &R &R
        &R输入 刷怪笼奖励 公式
        &R例子 0.5 或 0.1*[level]
        &R也就是 每个刷怪笼多刷.5个生物 或 每升级一次+.1个
        &R当前 [actual]
      invalidrule: |-
        &R &R
        &R无效公式. 数字 或 数学表达式 0.5 0.1*[level]
      setformula: '&R点击输入 刷怪笼奖励 公式'
      formulastatus: '&R刷怪笼奖励 公式正确'
      formulaneeded: Formula needed
      formulaneededdesc: Click the paper icon to set a spawn bonus formula
    rangeupgrade:
      name: '&R范围升级 奖励'
      description: |-
        &R &R
        &F边界&R
        &A+[rangelevel]&R
        &F格&R
      admindescription: |-
        &R &R
        &F边界外扩&R
      paneltitle: '&R范围升级 奖励编辑菜单'
      rulequestion: |-
        &R &R
        &R输入 范围奖励 公式
        &R例子 5 或 2*[level]
        &R当前 [actual]
      invalidrule: |-
        &R &R
        &R无效公式. 数字 或 数学表达式 5 2*[level]
      setformula: '&R设置 范围 公式'
      formulastatus: '&R范围升级 公式正确'
      formulaneeded: Formula needed
      formulaneededdesc: Click the paper icon to set a range formula
    command:
      name: '&R执行 命令'
      description: |-
        &R &R
        &F在升级过程中运行命令&R
      admindescription: |-
        &R &R
        &F执行 命令&R
      paneltitle: '&R执行命令 奖励编辑菜单'
    limits:
      name: '&R限制 奖励'
      description: |-
        &R &R
        &F[type]&R
        &F[target]&R
        &A+[amount]&R
      admindescription: |-
        &R &R
        &F可额外拥有 方块/实体&R
        &C需&R &E限制&R &F附属&R
        &ELimits Addon&R
      paneltitle: '&R限制放宽 奖励编辑菜单'
    cropgrowth:
      name: '&R作物生长 加成'
      description: |-
        &R &R
        &F每生长等级&R &A+[amount]&R &F生长速度&R
      admindescription: |-
        &R &R
        &F增加 作物 生长 速度 每岛&R
      paneltitle: '&R作物速度 奖励编辑菜单'
      rulequestion: |-
        &R &R
        &R输入 作物奖励 公式
        &R例子 0.5 或 0.1*[level]
        &R当前 [actual]
      invalidrule: |-
        &R &R
        &R无效公式. 数字 或 数学表达式 0.5 0.1*[level]
      setformula: '&R点击输入 作物速度 公式'
      formulastatus: '&R作物速度 公式正确'
      formulaneeded: Formula needed
      formulaneededdesc: Click the paper icon to set a growth bonus formula
