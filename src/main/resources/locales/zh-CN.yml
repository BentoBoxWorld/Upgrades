        &R &R
        &F点击切换为&R &C不可购买&R
      inactive: '&C不可购买&R'
      inactivedesc: |-
        &R &R
        &F点击切换为&R &A可购买&R
      description: '&B输入&R描述 仅此处可见'
      namedesc: |-
        &R &R
        &F点击&R&B输入&F此升级&R
        &F显示名&R
